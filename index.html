  <body>
    <script>
      (function () {
        const t = localStorage.getItem("learnify-theme");
        let d;
        if (t === "dark" || t === "light") {
          d = t;
        } else if (globalThis.matchMedia("(prefers-color-scheme: dark)").matches) {
          d = "dark";
        } else {
          d = "light";
        }
        document.documentElement.classList.add(d);
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
